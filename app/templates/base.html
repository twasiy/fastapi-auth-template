<!DOCTYPE html>
<html>
<head>
    <style>
        .wrapper { background-color: #f6f9fc; padding: 40px 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 8px; overflow: hidden; border: 1px solid #e1e4e8; }
        .header { padding: 30px; text-align: center; background-color: #1a73e8; color: white; }
        .content { padding: 40px; line-height: 1.6; color: #3c4043; }
        .button-container { text-align: center; margin: 30px 0; }
        .button { background-color: #1a73e8; color: white; padding: 12px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #70757a; }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <div class="header">
                <h2>{{ subject }}</h2>
            </div>
            <div class="content">
                <p>Hi <strong>{% if body.username %}{{ body.username }}{% else %}{{ body.full_name }}{% endif %}</strong>,</p>
                {% block email_content %}{% endblock %}
                <p>If the button doesn't work, copy and paste this link into your browser:</p>
                <p style="word-break: break-all; font-size: 12px; color: #1a73e8;">{{ body.url }}</p>
            </div>
            <div class="footer">
                &copy; {{ now.year }} Your App Name. All rights reserved.
            </div>
        </div>
    </div>
</body>
</html>
